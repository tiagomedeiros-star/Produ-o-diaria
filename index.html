<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produção Diária - PCP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body {
            background-image: linear-gradient(rgba(248, 250, 252, 0.7), rgba(248, 250, 252, 0.8)), url('unnamed.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-button.active { 
            background-color: white;
            border-bottom: 3px solid #2563eb; 
            color: #1e40af;
            font-weight: 800;
        }
        .card-animation { animation: fadeInScale 0.3s ease-out forwards; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .solid-panel { background-color: #ffffff; border: 1px solid #e2e8f0; }
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="font-sans text-slate-900 pb-10">

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-600 border-r-4 border-transparent mb-4"></div>
        <p class="font-black text-blue-800 uppercase tracking-widest text-sm animate-pulse">Enviando para Planilha Google...</p>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(typeof finalizeSubmit === 'function') finalizeSubmit()"></iframe>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg"><i data-lucide="layers" class="text-white w-6 h-6"></i></div>
                <h1 class="text-lg font-black text-slate-800 uppercase">Produção Diária - PCP</h1>
            </div>
            <div class="relative flex-1 md:w-64">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                <input type="text" id="search-input" oninput="filterCards()" placeholder="Procurar..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-full text-sm outline-none">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex solid-panel rounded-2xl shadow-sm mb-6 p-1 overflow-x-auto">
            <button onclick="switchTab('tiago')" id="btn-tiago" class="tab-button active flex-1 px-4 py-3 text-xs flex items-center justify-center gap-2 rounded-xl transition-all"><i data-lucide="user" class="w-4 h-4"></i> TIAGO</button>
            <button onclick="switchTab('alana')" id="btn-alana" class="tab-button flex-1 px-4 py-3 text-xs flex items-center justify-center gap-2 rounded-xl transition-all"><i data-lucide="user" class="w-4 h-4"></i> ALANA</button>
            <button onclick="switchTab('william')" id="btn-william" class="tab-button flex-1 px-4 py-3 text-xs flex items-center justify-center gap-2 rounded-xl transition-all"><i data-lucide="user" class="w-4 h-4"></i> WILLIAM</button>
            <button onclick="switchTab('concluidos')" id="btn-concluidos" class="tab-button flex-1 px-4 py-3 text-xs flex items-center justify-center gap-2 rounded-xl transition-all text-emerald-600"><i data-lucide="check-circle" class="w-4 h-4"></i> CONCLUÍDOS</button>
            <button onclick="switchTab('etiquetas')" id="btn-etiquetas" class="tab-button flex-1 px-4 py-3 text-xs flex items-center justify-center gap-2 rounded-xl transition-all text-amber-600"><i data-lucide="tag" class="w-4 h-4"></i> ETIQUETAS</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <aside class="space-y-4">
                <div class="solid-panel p-5 rounded-3xl shadow-sm">
                    <h2 class="font-bold text-slate-700 mb-4 uppercase text-[10px] tracking-widest">Importar para: <span id="current-name" class="text-blue-600">Tiago</span></h2>
                    <div class="space-y-3">
                        <label class="relative block group">
                            <div class="h-28 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center bg-slate-50 group-hover:bg-blue-50 cursor-pointer transition-all text-center px-4">
                                <i data-lucide="file-spreadsheet" class="w-8 h-8 text-slate-300"></i>
                                <span class="text-[10px] font-bold text-slate-400 mt-2 uppercase">Clique para selecionar CSV ou XLSX</span>
                            </div>
                            <input type="file" id="file-input" accept=".csv, .xlsx, .xls" class="hidden" onchange="handleFileUpload(event)">
                        </label>
                        <textarea id="paste-area" placeholder="Ou cole os dados aqui..." class="w-full h-20 p-4 border border-slate-200 rounded-2xl text-[10px] outline-none bg-slate-50 resize-none"></textarea>
                        <button onclick="processPastedData()" class="w-full bg-slate-900 text-white py-3 rounded-2xl font-bold text-[10px] uppercase shadow-lg hover:bg-slate-800">Adicionar Dados</button>
                    </div>
                </div>

                <div class="bg-slate-900 p-5 rounded-3xl text-white shadow-lg">
                    <div class="grid grid-cols-2 gap-3 mb-4 text-center">
                        <div class="bg-white/5 p-3 rounded-2xl border border-white/10"><p class="text-[9px] opacity-50 uppercase">Pendentes</p><p class="text-2xl font-black" id="stat-total">0</p></div>
                        <div class="bg-white/5 p-3 rounded-2xl border border-white/10"><p class="text-[9px] opacity-50 uppercase">Feitos</p><p class="text-2xl font-black text-emerald-400" id="stat-done">0</p></div>
                    </div>
                    <button onclick="clearCurrentTab()" class="w-full py-2 bg-red-500/20 text-red-400 rounded-xl text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition-all">Limpar Registos Locais</button>
                </div>
            </aside>

            <section id="cards-grid" class="lg:col-span-2">
                <div id="concluidos-tools" class="hidden mb-4 solid-panel p-4 rounded-3xl shadow-sm border-l-4 border-l-emerald-500 bg-emerald-50/50">
                    <button onclick="acaoSalvarTodos()" class="w-full bg-violet-600 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase shadow-lg hover:bg-violet-700 transition-all">Sincronizar Todos com Planilha Google</button>
                </div>
                <div id="etiquetas-tools" class="hidden mb-4 solid-panel p-4 rounded-3xl shadow-sm border-l-4 border-l-amber-500 bg-amber-50/50">
                    <button onclick="exportarEtiquetas()" class="w-full bg-green-600 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase shadow-lg hover:bg-green-700 transition-all">Gerar Excel de Etiquetas</button>
                </div>

                <div id="tiago" class="tab-content active"><div class="space-y-4" id="container-tiago"></div></div>
                <div id="alana" class="tab-content"><div class="space-y-4" id="container-alana"></div></div>
                <div id="william" class="tab-content"><div class="space-y-4" id="container-william"></div></div>
                <div id="concluidos" class="tab-content"><div class="space-y-4" id="container-concluidos"></div></div>
                <div id="etiquetas" class="tab-content"><div class="space-y-4" id="container-etiquetas"></div></div>

                <div id="empty-state" class="py-20 text-center opacity-30 flex flex-col items-center">
                    <i data-lucide="inbox" class="w-16 h-16"></i>
                    <p class="text-sm font-black uppercase mt-2">Lista Vazia</p>
                </div>
            </section>
        </div>
    </main>

    <script>
        const WEB_APP_URL = "https://script.google.com/a/macros/queonetics.com/s/AKfycby2ftCCf4SipPtZPnMuzzFFBcLoB54OXp4ssOk7hLS0w8aRK-b9C_CmVaR8lJihVgPg/exec";
        const DB_NAME = 'producao_pcp_v5_store';
        const JIRA_BASE_URL = "https://jira.trixlog.com/browse/";
        
        let currentTab = 'tiago';
        let store = JSON.parse(localStorage.getItem(DB_NAME)) || { tiago: [], alana: [], william: [], concluidos: [], etiquetas: [] };
        
        let submissionQueue = [];
        let currentProcessingId = null;
        let isBatchSubmit = false;

        const camposSeriais = ["Serial Rastreador", "Iccid", "Serial TX009", "Serial Leitor", "Serial Teclado", "Serial Smart Speaker", "Serial Câmera", "Iccid Camera"];
        
        function save() { localStorage.setItem(DB_NAME, JSON.stringify(store)); updateStats(); }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const isCSV = file.name.toLowerCase().endsWith('.csv');
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    let workbook;
                    if (isCSV) {
                        workbook = XLSX.read(e.target.result, { type: 'string' });
                    } else {
                        const data = new Uint8Array(e.target.result);
                        workbook = XLSX.read(data, { type: 'array' });
                    }
                    processSheet(workbook.Sheets[workbook.SheetNames[0]]);
                } catch(err) {
                    alert("Erro ao ler arquivo. Verifique se o formato é válido.");
                }
            };
            if (isCSV) {
                reader.readAsText(file, 'UTF-8');
            } else {
                reader.readAsArrayBuffer(file);
            }
            event.target.value = '';
        }

        function processPastedData() {
            const text = document.getElementById('paste-area').value;
            if (text.trim()) {
                const wb = XLSX.read(text, {type: 'string'});
                processSheet(wb.Sheets[wb.SheetNames[0]]);
                document.getElementById('paste-area').value = '';
            }
        }

        function processSheet(sheet) {
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
            if (rows.length < 1) return;
            const rawHeaders = rows[0].map(h => (h || "").toString().trim());
            const dataRows = rows.slice(1);
            const processed = dataRows.map(rowArray => {
                let item = {};
                rawHeaders.forEach((h, idx) => {
                    let val = (rowArray[idx] || "").toString().trim();
                    if (!val) return;
                    let cleanKey = h.replace(/Campo personalizado \((.*?)\)/g, '$1').replace('Campo personalizado ', '');
                    if (item[cleanKey]) item[cleanKey] += " + " + val;
                    else item[cleanKey] = val;
                });

                let titleField = item["Chave da ocorrência"] ? "Chave da ocorrência" : (item["Chamados"] ? "Chamados" : rawHeaders[0]);
                let link = null;
                const linkSearch = JSON.stringify(item);
                
                const match = linkSearch.match(/(CONFIGURAR|PROCONFIG)-\d+/i);
                
                if (match) link = JIRA_BASE_URL + match[0].toUpperCase();

                return { ...item, _id: 'ID-'+Math.random().toString(36).substr(2,9), _origin: currentTab, _link: link, _titleField: titleField };
            });

            store[currentTab] = [...store[currentTab], ...processed];
            save(); render();
        }

        function render() {
            const container = document.getElementById('container-' + currentTab);
            const data = store[currentTab];
            container.innerHTML = '';
            document.getElementById('empty-state').style.display = data.length > 0 ? 'none' : 'flex';
            
            data.forEach(item => {
                const isConcluido = currentTab === 'concluidos';
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 rounded-2xl shadow-sm mb-4 card-animation overflow-hidden";
                
                let title = item[item._titleField] || "Sem ID";
                let inputs = '';
                camposSeriais.forEach(c => {
                    inputs += `<div><label class="text-[7px] font-bold text-slate-400 uppercase">${c}</label><input type="text" value="${item[c]||''}" onchange="updateVal('${item._id}','${c}',this.value)" class="w-full bg-slate-50 border border-slate-200 text-[10px] font-bold rounded-lg px-2 py-1.5 outline-none focus:ring-1 focus:ring-blue-500"></div>`;
                });

                let details = '';
                Object.entries(item).forEach(([k,v]) => {
                    if(!k.startsWith('_') && !camposSeriais.includes(k) && k !== item._titleField && v) {
                        details += `<div class="border-l-2 border-slate-100 pl-2"><p class="text-[7px] text-slate-400 font-bold uppercase">${k}</p><p class="text-[9px] font-semibold text-slate-700">${v}</p></div>`;
                    }
                });
                
                // --- MUDANÇA DO BOTÃO DO JIRA AQUI ---
                card.innerHTML = `
                    <div class="px-4 py-3 bg-slate-50 border-b flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <span class="text-[11px] font-black text-slate-800">${title}</span>
                            ${item._link ? `<button onclick="abrirJiraComDados('${item._id}')" class="bg-blue-600 hover:bg-blue-700 text-[9px] text-white px-3 py-1 rounded-lg font-bold flex items-center gap-1 transition-colors">Autopreencher Jira <i data-lucide="external-link" class="w-3 h-3"></i></button>` : ''}
                        </div>
                        <div class="flex gap-2">
                            ${isConcluido ? `<button onclick="enviarIndividual('${item._id}')" class="bg-violet-600 hover:bg-violet-700 text-white px-3 py-1 rounded-lg text-[9px] font-bold uppercase flex items-center gap-1 transition-colors">Enviar Planilha <i data-lucide="send" class="w-3 h-3"></i></button>` : ''}
                            ${!isConcluido && currentTab !== 'etiquetas' ? `<button onclick="concluir('${item._id}')" class="bg-slate-900 hover:bg-emerald-600 text-white px-3 py-1 rounded-lg text-[9px] font-bold uppercase transition-colors">Concluir</button>` : ''}
                        </div>
                    </div>
                    <div class="p-4">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">${details}</div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-2">${inputs}</div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        // --- NOVA FUNÇÃO PARA ENVIAR DADOS PARA O TAMPERMONKEY ---
        function abrirJiraComDados(id) {
            const item = store[currentTab].find(x => x._id === id);
            if (!item || !item._link) return;

            // Mapeamento dos campos do seu PCP para enviar na URL
            const dadosParaEnviar = {
                serial: item["Serial Rastreador"] || "",
                iccid: item["Iccid"] || "",
                tx009: item["Serial TX009"] || "",
                leitor: item["Serial Leitor"] || "",
                teclado: item["Serial Teclado"] || "",
                smartspeaker: item["Serial Smart Speaker"] || "",
                camera: item["Serial Câmera"] || ""
            };
            
            const urlJira = new URL(item._link);
            urlJira.searchParams.append("autofill", "true");
            
            // Adiciona apenas os campos que estiverem preenchidos no link
            Object.entries(dadosParaEnviar).forEach(([chave, valor]) => {
                if (valor && valor.toString().trim() !== "") {
                    urlJira.searchParams.append(chave, valor);
                }
            });

            window.open(urlJira.toString(), '_blank');
        }

        function acaoSalvarTodos() {
            if (store.concluidos.length === 0) return;
            isBatchSubmit = true;
            document.getElementById('loading-overlay').style.display = 'flex';
            submissionQueue = [...store.concluidos];
            processNextInQueue();
        }

        function enviarIndividual(id) {
            const item = store.concluidos.find(i => i._id === id);
            if (!item) return;
            isBatchSubmit = false;
            document.getElementById('loading-overlay').style.display = 'flex';
            submissionQueue = [item];
            processNextInQueue();
        }

        function processNextInQueue() {
            if (submissionQueue.length === 0) {
                document.getElementById('loading-overlay').style.display = 'none';
                if (isBatchSubmit) alert("Sincronização de todos os cards concluída!");
                return;
            }
            const item = submissionQueue.shift();
            currentProcessingId = item._id;
            
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = WEB_APP_URL;
            form.target = 'hidden_iframe';
            Object.entries(item).forEach(([k, v]) => {
                if (!k.startsWith('_') || k === '_origin') {
                    const inp = document.createElement('input');
                    inp.type = 'hidden'; inp.name = k; inp.value = v;
                    form.appendChild(inp);
                }
            });
            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
        }

        window.finalizeSubmit = function() {
            if (currentProcessingId) {
                const idx = store.concluidos.findIndex(i => i._id === currentProcessingId);
                if (idx > -1) {
                    const item = store.concluidos.splice(idx, 1)[0];
                    item._concluidoEm = new Date().toLocaleString();
                    store.etiquetas.unshift(item);
                    save(); render();
                }
                currentProcessingId = null;
                processNextInQueue();
            }
        };

        function exportarEtiquetas() {
            if(store.etiquetas.length === 0) return;
            const data = store.etiquetas.map(i => ({
                "Serial Rastreador": i["Serial Rastreador"] || "",
                "ICCID": i["Iccid"] || "",
                "Cliente": i["Branch via argos"] || i["Branch Via Argo"] || "",
                "Serviço": i["Tipo de serviço"] || "",
                "Placa": i["Placas"] || "",
		        "Tipo de firmware": i["Tipo de firmware"] || "",
                "Data": i._concluidoEm || "",
                "Materiais": i["Material para manutenção"] || ""
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Etiquetas");
            
            XLSX.writeFile(wb, "Etiquetas_PCP.xlsx");
            
            setTimeout(() => {
                if(confirm("Planilha baixada! Deseja limpar os registros da aba de Etiquetas?")) {
                    store.etiquetas = [];
                    save();
                    render();
                }
            }, 500);
        }

        function updateVal(id,f,v) { const i = store[currentTab].find(x=>x._id===id); if(i){i[f]=v;save();}}
        
        function concluir(id) {
            const idx = store[currentTab].findIndex(x=>x._id===id);
            const i = store[currentTab].splice(idx, 1)[0];
            store.concluidos.unshift(i);
            save(); render();
        }
        
        function clearCurrentTab() { if(confirm("Limpar dados desta aba?")) { store[currentTab]=[]; save(); render(); } }
        
        function switchTab(id) { 
            currentTab = id;
            document.querySelectorAll('.tab-button').forEach(b => b.classList.toggle('active', b.id === 'btn-'+id));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === id));
            document.getElementById('current-name').innerText = id.charAt(0).toUpperCase() + id.slice(1);
            document.getElementById('concluidos-tools').classList.toggle('hidden', id !== 'concluidos');
            document.getElementById('etiquetas-tools').classList.toggle('hidden', id !== 'etiquetas');
            render(); 
        }
        
        function updateStats() {
            document.getElementById('stat-total').innerText = store.tiago.length + store.alana.length + store.william.length;
            document.getElementById('stat-done').innerText = store.concluidos.length;
        }
        
        function filterCards() {
            const q = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.card-animation').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none');
        }

        window.onload = () => { render(); updateStats(); };
    </script>
</body>
</html>
